name: Build hnkb40

on:
  push:
    paths:
      - ".github/workflows/build.yml"
      - "app/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-hnkb40:
    runs-on: ubuntu-latest
    container:
      image: docker.io/zmkfirmware/zmk-build-arm:4.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
          key: ${{ runner.os }}-build-${{ hashFiles('app/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-
        timeout-minutes: 2
        continue-on-error: true

      - name: Initialize workspace (west init)
        run: west init -l app

      - name: Update modules (west update)
        run: west update --fetch-opt=--filter=tree:0

      - name: Export Zephyr CMake package (west zephyr-export)
        run: west zephyr-export

      - name: Build hnkb40 with USB logging
        run: west build -s app -p -b hnkb40/nrf52840/zmk -S zmk-usb-logging

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: hnkb40-zmk-firmware
          path: |
            build/zephyr/zmk.uf2
            build/zephyr/zmk.hex
